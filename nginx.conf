# ─────────────────────────────────────────────────────────────────
#  ZenFlow — Nginx Reverse Proxy Configuration
#  File: /etc/nginx/sites-available/zenflow
#
#  Prerequisites:
#    sudo apt install nginx certbot python3-certbot-nginx
#    sudo certbot --nginx -d zenflow.sg -d www.zenflow.sg
#
#  Enable:
#    sudo ln -s /etc/nginx/sites-available/zenflow /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────

# Rate limit zones (defined at http level — put in /etc/nginx/nginx.conf if needed)
limit_req_zone $binary_remote_addr zone=api_global:10m  rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_booking:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=api_conn:10m;

# ── Redirect all HTTP → HTTPS ─────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name zenflow.sg www.zenflow.sg;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name zenflow.sg www.zenflow.sg;

    # ── TLS (managed by Certbot) ──────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/zenflow.sg/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zenflow.sg/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── TLS hardening ─────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ──────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"        always;
    add_header X-Frame-Options           "DENY"           always;
    add_header X-XSS-Protection          "1; mode=block"  always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'" always;

    # Hide Nginx version
    server_tokens off;

    # ── Connection limits ─────────────────────────────────────
    limit_conn api_conn 20;       # max 20 concurrent connections per IP
    client_max_body_size 10M;     # max upload size (photos)
    client_body_timeout  30s;
    client_header_timeout 10s;

    # ── API proxy ─────────────────────────────────────────────
    location /api/ {
        # Strip /api prefix before forwarding
        rewrite ^/api(/.*)$ $1 break;

        limit_req zone=api_global burst=20 nodelay;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Don't expose upstream errors
        proxy_intercept_errors on;
        error_page 502 503 504 /50x.json;
    }

    # ── Stricter limits on auth endpoints ─────────────────────
    location /api/auth/login {
        rewrite ^/api(/.*)$ $1 break;
        limit_req zone=api_auth burst=3 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/auth/register {
        rewrite ^/api(/.*)$ $1 break;
        limit_req zone=api_auth burst=2 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/bookings {
        rewrite ^/api(/.*)$ $1 break;
        limit_req zone=api_booking burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Serve the frontend HTML ───────────────────────────────
    location / {
        root /var/www/zenflow;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Block sensitive paths ─────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location = /50x.json {
        internal;
        default_type application/json;
        return 200 '{"error":"Service temporarily unavailable","code":503}';
    }

    # ── Logging ───────────────────────────────────────────────
    access_log /var/log/nginx/zenflow_access.log combined;
    error_log  /var/log/nginx/zenflow_error.log warn;
}
