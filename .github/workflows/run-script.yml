name: Run Setup and Test Server

on:
  push:
    branches: [ main ]

jobs:
  run-project:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Step 1: Create the dummy .env file so your code is happy
    - name: Copy .env.example to .env
      run: |
        copy .env.example .env

    - name: Execute batch file
      run: |
        .\setup_venzv.bat

    - name: Test Run Uvicorn Server
      # Step 2: Pass the missing secret value into the test environment
      env:
        ZF_SECRET: "github_actions_dummy_test_key_12345"
      run: |
        $job = Start-Job -ScriptBlock { uvicorn main:app --port 8000 }
        Start-Sleep -Seconds 10
        Stop-Job $job